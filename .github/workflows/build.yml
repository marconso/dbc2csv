name: Build & Release (Rust + MUSL)

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: linux-musl
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Install cross (Linux MUSL)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build with cross (MUSL)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release directory
        run: mkdir -p release

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          BIN_NAME=$(basename $(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].targets[] | select(.kind[]=="bin") | .name'))
          cp target/${{ matrix.target }}/release/$BIN_NAME release/
          tar -czf release/${BIN_NAME}-${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz -C release $BIN_NAME
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $bin = (cargo metadata --no-deps --format-version=1 | ConvertFrom-Json).packages[0].targets | Where-Object { $_.kind -contains "bin" } | Select-Object -First 1 -ExpandProperty name
          Copy-Item "target\\${{ matrix.target }}\\release\\$bin.exe" release\
          Compress-Archive -Path "release\\$bin.exe" -DestinationPath "release\\$bin-windows-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.release.outputs.upload_url }}
        run: |
          UPLOAD_URL="${UPLOAD_URL%\{*}"
          for f in artifacts/*/*; do
            echo "Uploading $f"
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f" \
              "$UPLOAD_URL?name=$(basename $f)"
          done
